<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livret d'accueil - La Perle Bohème</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Bienvenue</h1>
            <p class="subtitle">La Perle Bohème</p>
            <div class="location">
                <span class="icon-pin">📍</span> 503 Avenue du Palais de la Mer, 30240 Le Grau-du-Roi
            </div>
        </header>

        <section class="section">
            <h2 class="section-title">EXPLORER</h2>
            <div class="filter-bar">
                <div class="filter-item active">
                    <span class="filter-icon">🎫</span> Activités
                </div>
                <div class="filter-item">
                    <span class="filter-icon">🍽️</span> Restaurants
                </div>
                <div class="filter-item">
                    <span class="filter-icon">🍷</span> Bars
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">VOTRE LOGEMENT</h2>
            
            <div class="card" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&q=80&w=600');">
                <div class="card-content">
                    <h3 class="card-title">WiFi</h3>
                    <span class="voir-link">VOIR ∨</span>
                </div>
            </div>

            <div class="card" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80&w=600');">
                <div class="card-content">
                    <h3 class="card-title">A votre arrivée</h3>
                    <span class="voir-link">VOIR ∨</span>
                </div>
            </div>

            <div class="card" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&fit=crop&q=80&w=600');">
                <div class="card-content">
                    <h3 class="card-title">Avant votre départ</h3>
                    <span class="voir-link">VOIR ∨</span>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
