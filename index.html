<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Livret</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <h1>Bienvenue</h1>
    <h2>Chez lulu</h2>
    <p class="address">📍 1 Avenue des Champs-Élysées, Paris, France</p>
  </header>

  <!-- MENU -->
  <section class="menu">
    <p class="section-title">Explorer</p>

    <div class="pills">
      <button class="pill active" data-filter="activites">🎟 Activités</button>
      <button class="pill" data-filter="restaurants">🍽 Restaurants</button>
      <button class="pill" data-filter="bars">🍷 Bars</button>
    </div>
  </section>

  <!-- LOGEMENT -->
  <section class="content">
    <p class="section-title">Votre logement</p>

    <div class="card" data-category="activites">
      <img src="assets/wifi.jpg" />
      <div class="overlay">
        <span>WiFi</span>
        <button>VOIR</button>
      </div>
    </div>

    <div class="card" data-category="activites">
      <img src="assets/checkin.jpg" />
      <div class="overlay">
        <span>À votre arrivée</span>
        <button>VOIR</button>
      </div>
    </div>

    <div class="card" data-category="activites">
      <img src="assets/checkout.jpg" />
      <div class="overlay">
        <span>Avant votre départ</span>
        <button>VOIR</button>
      </div>
    </div>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
